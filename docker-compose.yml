services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tracepoint
      POSTGRES_PASSWORD: tracepoint_dev
      POSTGRES_DB: tracepoint
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
